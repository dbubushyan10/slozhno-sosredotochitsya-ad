  - main [ref=e13]:
    - generic [ref=e14]:
      - heading "Почему сосредоточиться так сложно" [level=2] [ref=e15]
      - list [ref=e16]:
        - listitem [ref=e17]:
          - article [ref=e18]:
            - heading "Многозадачность" [level=3] [ref=e19]
            - paragraph [ref=e20]:
              - text: Особенно сложно сосредоточиться, когда задач много и все они — важные. Где же легендарная многозадачность, когда она так нужна вам (и всем нанимающим менеджерам этого мира)? А дело в том, что её просто не существует. Исследователи
              - link "выяснили" [ref=e21] [cursor=pointer]:
                - /url: https://dana.org/article/multicosts-of-multitasking/
              - text: ", что мозгу тяжело концентрироваться даже на двух делах одновременно. А когда в поле внимания попадает несколько важных задач, организм паникует и выделяет кортизол и адреналин — «гормоны стресса». Из-за этого мы работаем невнимательно: ошибаемся и быстро устаём."
        - listitem [ref=e22]:
          - article [ref=e23]:
            - heading "Дофамин" [level=3] [ref=e24]
            - paragraph [ref=e25]: "С гормонами стресса всё понятно, но дальше — ещё интереснее. В нашей невозможности сосредоточиться замешана и полная противоположность стрессу — дофамин. Это вещество участвует в системе вознаграждения мозга. Причём тут он? Мы часто отвлекаемся от важной задачи на что-то более «приятное» для мозгов. Например, смотрим лайки в соцсетях. В это время и выделяется дофамин — и мы чувствуем удовольствие. Получается замкнутый круг: чем больше отвлекаешься, тем больше удовольствия получаешь."
    - generic [ref=e26]:
      - heading "Что снижает концентрацию внимания?" [level=2] [ref=e27]
      - list [ref=e28]:
        - listitem [ref=e29]:
          - article [ref=e30]:
            - heading "Многозадачность" [level=3] [ref=e31]
            - paragraph [ref=e32]: Как концентрация может снижаться из-за… концентрации? Любая стрессовая ситуация (и резко меняющийся мир в целом) заставляет наш мозг постоянно «сканировать» окружающую среду на предмет опасности. Например, читать новости вместо работы. Но быть собранными всё время — невозможно. Концентрация — мышца, и она может не выдержать, если не давать ей отдохнуть.
        - listitem [ref=e33]:
          - article [ref=e34]:
            - heading "Еда" [level=3] [ref=e35]
            - paragraph [ref=e36]: "«Быстрые углеводы» — сахар, белый хлеб, сладости — молниеносно доставляют в мозг энергию и помогают ему лучше работать. Но уходит эта энергия также быстро, как и приходит. А мы в результате попадаем на «углеводные качели»: как только действие «быстрых углеводов» заканчивается, мы чувствуем усталость и сонливость. И хотим ещё больше быстрых углеводов."
        - listitem [ref=e37]:
          - article [ref=e38]:
            - heading "Гаджеты" [level=3] [ref=e39]
            - paragraph [ref=e40]: Да-да, это та самая ситуация, когда на экране ноутбука — код, в наушниках — подкаст, а на компьютере фоном — ещё и видео с забавными утятами. В результате мозг пытается переключиться с одной задачи на другую — и просто не может. А чтобы вернуться к состоянию полной концентрации, человеку в среднем нужно 20 минут. Вот и получается, что чем больше времени мы проводим в гаджетах, тем больше времени затем нужно, чтобы вернуться к работе.
    - generic [ref=e41]:
      - heading "Как концентрироваться лучше, чем золотая рыбка (то есть дольше трёх секунд)" [level=2] [ref=e42]
      - generic [ref=e43]:
        - heading "5 простых (на самом деле не очень) советов" [level=3] [ref=e44]
        - list [ref=e45]:
          - listitem [ref=e46]:
            - article [ref=e47]:
              - heading "Представьте небо и облака" [level=4] [ref=e48]
              - paragraph [ref=e49]: Или листья в ручье. Тут дело в лёгкой медитации, которая помогает успокоиться. Ведь часто именно тревожные мысли о сложных задачах как раз и мешают эти сложные задачи делать. В такие моменты можно закрыть глаза и представить, что чистое небо — это вы, а облака — тревожные мысли. И сколько бы их ни было — ясное небо всегда будет где-то там, за тучами, и никуда не денется. Это упражнение поможет вернуться в настоящий момент, а не волноваться о потенциальных проблемах из будущего.
          - listitem [ref=e50]:
            - article [ref=e51]:
              - heading "Включите музыку" [level=4] [ref=e52]
              - paragraph [ref=e53]: Но не любую, и не любимую. Любимая может быть связана с сильными положительными эмоциями, которые тоже очень сильно отвлекают. Подойдёт тихая, спокойная, умеренно-ритмичная. Можно вообще попробовать включить плейлист в «белым шумом» или нейромузыкой.
          - listitem [ref=e54]:
            - article [ref=e55]:
              - heading "Прогуляйтесь" [level=4] [ref=e56]
              - paragraph [ref=e57]:
                - text: "Или даже пробегитесь. Лучше найти парк или лес: один эксперимент"
                - link "показал" [ref=e58] [cursor=pointer]:
                  - /url: https://www.sciencedirect.com/science/article/abs/pii/S0272494415000328
                - text: ", что созерцание природы повышает концентрацию, в то время как после просмотра городских пейзажей она наоборот понижается. Можно совместить прогулку с физическими упражнениями или бегом — так в мозг поступит ещё больше кислорода и он будет лучше работать. Но и простая двадцатиминутная прогулка — тоже отличный вариант."
          - listitem [ref=e59]:
            - article [ref=e60]:
              - heading "Хорошо ешьте" [level=4] [ref=e61]
              - paragraph [ref=e62]: "Мы — не ваша бабушка, но это правда важно. Выбирайте продукты, которые препятствуют резким скачкам сахара в крови. Например, с высоким содержанием клетчатки: овощи, ягоды, бобовые (нут, чечевица, фасоль), коричневый рис, хлеб из цельнозерновой пшеницы."
          - listitem [ref=e63]:
            - article [ref=e64]:
              - heading "Читайте" [level=4] [ref=e65]
              - paragraph [ref=e66]: "Настоящие бумажные книги. Это правда помогает с концентрацией: чтобы прочитать пост в соцсети, достаточно нескольких минут или даже секунд. А вот интересная книга способна затянуть и на несколько часов и круто тренирует направленное внимание."
