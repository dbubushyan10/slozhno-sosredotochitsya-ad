  - main [ref=e13]:
    - generic [ref=e14]:
      - heading "Почему сосредоточиться так сложно" [level=2] [ref=e15]
      - article [ref=e16]:
        - heading "Многозадачность" [level=3] [ref=e17]
        - paragraph [ref=e18]:
          - text: Особенно сложно сосредоточиться, когда задач много и все они — важные. Где же легендарная многозадачность, когда она так нужна вам (и всем нанимающим менеджерам этого мира)? А дело в том, что её просто не существует. Исследователи
          - link "выяснили" [ref=e19] [cursor=pointer]:
            - /url: https://www.dana.org/article/multicosts-of-multitasking/
          - text: ", что мозгу тяжело концентрироваться даже на двух делах одновременно. А когда в поле внимания попадает несколько важных задач, организм паникует и выделяет кортизол и адреналин — «гормоны стресса». Из-за этого мы работаем невнимательно: ошибаемся и быстро устаём."
      - article [ref=e20]:
        - heading "Дофамин" [level=3] [ref=e21]
        - paragraph [ref=e22]: "С гормонами стресса всё понятно, но дальше — ещё интереснее. В нашей невозможности сосредоточиться замешана и полная противоположность стрессу — дофамин. Это вещество участвует в системе вознаграждения мозга. Причём тут он? Мы часто отвлекаемся от важной задачи на что-то более «приятное» для мозгов. Например, смотрим лайки в соцсетях. В это время и выделяется дофамин — и мы чувствуем удовольствие. Получается замкнутый круг: чем больше отвлекаешься, тем больше удовольствия получаешь."
    - generic [ref=e23]:
      - heading "Что снижает концентрацию внимания?" [level=2] [ref=e24]
      - article [ref=e25]:
        - heading "Многозадачность" [level=3] [ref=e26]
        - paragraph [ref=e27]: Как концентрация может снижаться из-за… концентрации? Любая стрессовая ситуация (и резко меняющийся мир в целом) заставляет наш мозг постоянно «сканировать» окружающую среду на предмет опасности. Например, читать новости вместо работы. Но быть собранными всё время — невозможно. Концентрация — мышца, и она может не выдержать, если не давать ей отдохнуть.
      - article [ref=e28]:
        - heading "Еда" [level=3] [ref=e29]
        - paragraph [ref=e30]: "«Быстрые углеводы» — сахар, белый хлеб, сладости — молниеносно доставляют в мозг энергию и помогают ему лучше работать. Но уходит эта энергия также быстро, как и приходит. А мы в результате попадаем на «углеводные качели»: как только действие «быстрых углеводов» заканчивается, мы чувствуем усталость и сонливость. И хотим ещё больше быстрых углеводов."
      - article [ref=e31]:
        - heading "Гаджеты" [level=3] [ref=e32]
        - paragraph [ref=e33]: Да-да, это та самая ситуация, когда на экране ноутбука — код, в наушниках — подкаст, а на компьютере фоном — ещё и видео с забавными утятами. В результате мозг пытается переключиться с одной задачи на другую — и просто не может. А чтобы вернуться к состоянию полной концентрации, человеку в среднем нужно 20 минут. Вот и получается, что чем больше времени мы проводим в гаджетах, тем больше времени затем нужно, чтобы вернуться к работе.
    - generic [ref=e34]:
      - heading "Как концентрироваться лучше, чем золотая рыбка (то есть дольше трёх секунд)" [level=2] [ref=e35]
      - heading "5 простых (на самом деле не очень) советов" [level=3] [ref=e36]
      - article [ref=e37]:
        - heading "Представьте небо и облака" [level=4] [ref=e38]
        - paragraph [ref=e39]: Или листья в ручье. Тут дело в лёгкой медитации, которая помогает успокоиться. Ведь часто именно тревожные мысли о сложных задачах как раз и мешают эти сложные задачи делать. В такие моменты можно закрыть глаза и представить, что чистое небо — это вы, а облака — тревожные мысли. И сколько бы их ни было — ясное небо всегда будет где-то там, за тучами, и никуда не денется. Это упражнение поможет вернуться в настоящий момент, а не волноваться о потенциальных проблемах из будущего.
      - article [ref=e40]:
        - heading "Включите музыку" [level=4] [ref=e41]
        - paragraph [ref=e42]: Но не любую, и не любимую. Любимая может быть связана с сильными положительными эмоциями, которые тоже очень сильно отвлекают. Подойдёт тихая, спокойная, умеренно-ритмичная. Можно вообще попробовать включить плейлист с «белым шумом» или нейромузыкой.
      - article [ref=e43]:
        - heading "Прогуляйтесь" [level=4] [ref=e44]
        - paragraph [ref=e45]:
          - text: "Или даже пробегитесь. Лучше найти парк или лес: один эксперимент"
          - link "показал" [ref=e46] [cursor=pointer]:
            - /url: https://www.sciencedirect.com/science/article/abs/pii/S0272494415000328
          - text: ", что созерцание природы повышает концентрацию, в то время как после просмотра городских пейзажей она наоборот понижается. Можно совместить прогулку с физическими упражнениями или бегом — так в мозг поступит ещё больше кислорода и он будет лучше работать. Но и простая двадцатиминутная прогулка — тоже отличный вариант."
      - article [ref=e47]:
        - heading "Хорошо ешьте" [level=4] [ref=e48]
        - paragraph [ref=e49]: "Мы — не ваша бабушка, но это правда важно. Выбирайте продукты, которые препятствуют резким скачкам сахара в крови. Например, с высоким содержанием клетчатки: овощи, ягоды, бобовые (нут, чечевица, фасоль), коричневый рис, хлеб из цельнозерновой пшеницы."
      - article [ref=e50]:
        - heading "Читайте" [level=4] [ref=e51]
        - paragraph [ref=e52]: "Настоящие бумажные книги. Это правда помогает с концентрацией: чтобы прочитать пост в соцсети, достаточно нескольких минут или даже секунд. А вот интересная книга способна затянуть и на несколько часов и круто тренирует направленное внимание."
